<div class="tree-canvas" #treeCanvas>
  <svg id="treeSvg" [attr.viewBox]="viewBoxString()" xmlns="http://www.w3.org/2000/svg"
    (mousedown)="onSvgMouseDown($event)">
    <defs>
      <marker
        id="ah"
        viewBox="0 0 10 10"
        refX="9"
        refY="5"
        markerWidth="5"
        markerHeight="5"
        orient="auto-start-reverse"
      >
        <path
          d="M1 2L8 5L1 8"
          fill="none"
          stroke="rgba(120,140,200,.45)"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </marker>
      <marker
        id="ahb"
        viewBox="0 0 10 10"
        refX="9"
        refY="5"
        markerWidth="5"
        markerHeight="5"
        orient="auto-start-reverse"
      >
        <path
          d="M1 2L8 5L1 8"
          fill="none"
          stroke="#4a7cf7"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </marker>
      <marker
        id="ahg"
        viewBox="0 0 10 10"
        refX="9"
        refY="5"
        markerWidth="5"
        markerHeight="5"
        orient="auto-start-reverse"
      >
        <path
          d="M1 2L8 5L1 8"
          fill="none"
          stroke="rgba(120,140,200,.2)"
          stroke-width="1.2"
          stroke-linecap="round"
        />
      </marker>
      <filter id="glow-f">
        <feGaussianBlur stdDeviation="4" result="b" />
        <feMerge>
          <feMergeNode in="b" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
    <g id="treeEdges">
      @for (edge of treeEdges(); track edge.id) {
        <path
          [attr.d]="edge.path"
          fill="none"
          [attr.stroke]="edge.stroke"
          [attr.stroke-width]="edge.strokeWidth"
          [attr.marker-end]="edge.markerEnd"
          [class.new-edge]="edge.isNew"
        />
      }
    </g>
    <g id="treeNodes">
      @for (node of treeNodes(); track node.id) {
        <g
          [attr.data-id]="node.id"
          role="button"
          tabindex="0"
          [attr.aria-label]="node.label + (node.isCurrent ? ' (activo)' : '')"
          (click)="onNodeClick(node.id)"
          (mouseenter)="showNodeTooltip(node)"
          (mouseleave)="hideTooltip()"
          class="tree-node"
          [class.current]="node.isCurrent"
          [class.on-path]="node.isOnPath"
          [style.animation]="node.isNew ? 'nodeIn .5s cubic-bezier(.34,1.56,.64,1) both' : ''"
        >
          @if (node.isCurrent) {
            <rect
              [attr.x]="node.x - 8"
              [attr.y]="node.y - 8"
              [attr.width]="node.width + 16"
              [attr.height]="node.height + 16"
              rx="14"
              [attr.fill]="node.color.fill"
              opacity="0.7"
              filter="url(#glow-f)"
            />
            <rect
              [attr.x]="node.x - 4"
              [attr.y]="node.y - 4"
              [attr.width]="node.width + 8"
              [attr.height]="node.height + 8"
              rx="11"
              fill="none"
              [attr.stroke]="node.color.stroke"
              stroke-width="1.4"
              class="ring-float"
            />
          }
          <rect
            [attr.x]="node.x"
            [attr.y]="node.y"
            [attr.width]="node.width"
            [attr.height]="node.height"
            rx="8"
            [attr.fill]="node.fill"
            [attr.stroke]="node.stroke"
            [attr.stroke-width]="node.strokeWidth"
          />
          <text
            [attr.x]="node.x + node.width / 2"
            [attr.y]="node.y + node.height / 2 + 1"
            text-anchor="middle"
            dominant-baseline="central"
            [attr.fill]="node.textFill"
            font-size="10.5"
            [attr.font-weight]="node.isCurrent ? '700' : node.isOnPath ? '600' : '400'"
            font-family="Plus Jakarta Sans, sans-serif"
            letter-spacing="0.01em"
          >
            {{ node.displayLabel }}
          </text>
          @if (node.isCurrent) {
            <text
              [attr.x]="node.x + node.width - 4"
              [attr.y]="node.y + 4"
              text-anchor="end"
              dominant-baseline="hanging"
              [attr.fill]="node.color.stroke"
              font-size="7.5"
              font-family="JetBrains Mono, monospace"
              opacity="0.65"
            >
              D{{ node.depth }}
            </text>
          }
        </g>
      }
    </g>
    
    <!-- Preview edges (connections to choice options) -->
    <g id="previewEdges">
      @for (edge of previewEdges(); track edge.id) {
        <path
          [attr.d]="edge.path"
          fill="none"
          [attr.stroke]="edge.stroke"
          [attr.stroke-width]="edge.strokeWidth"
          [attr.marker-end]="edge.markerEnd"
          [class.new-edge]="edge.isNew"
        />
      }
    </g>
    
    <!-- Preview nodes (choice options shown on tree) -->
    <g id="previewNodes">
      @for (node of previewNodes(); track node.id) {
        <g
          [attr.data-id]="node.id"
          role="button"
          tabindex="0"
          [attr.aria-label]="node.label + (node.isSelected ? ' (seleccionado)' : node.isDisabled ? ' (deshabilitado)' : '')"
          (click)="onPreviewClick(node)"
          (mouseenter)="showPreviewTooltip(node)"
          (mouseleave)="hideTooltip()"
          class="tree-node preview-node"
          [class.selected]="node.isSelected"
          [class.disabled]="node.isDisabled"
          [class.ghost]="node.isGhost"
          [class.loading]="loadingNodeId() === node.id"
        >
          <!-- Outer ring - always rendered but opacity transitions -->
          <rect
            [attr.x]="node.x - 4"
            [attr.y]="node.y - 4"
            [attr.width]="node.width + 8"
            [attr.height]="node.height + 8"
            rx="10"
            fill="none"
            [attr.stroke]="node.color.stroke"
            stroke-width="1.8"
            class="preview-ring"
          />
          <rect
            [attr.x]="node.x"
            [attr.y]="node.y"
            [attr.width]="node.width"
            [attr.height]="node.height"
            rx="8"
            [attr.fill]="node.fill"
            [attr.stroke]="node.stroke"
            [attr.stroke-width]="node.strokeWidth"
          />

          <text
            [attr.x]="node.x + node.width / 2"
            [attr.y]="node.displayLines.length > 1 ? node.y + node.height / 2 - 5 : node.y + node.height / 2 + 1"
            text-anchor="middle"
            dominant-baseline="central"
            [attr.fill]="node.textFill"
            font-size="9.5"
            [attr.font-weight]="node.isSelected ? '700' : '500'"
            font-family="Plus Jakarta Sans, sans-serif"
            letter-spacing="0.01em"
          >
            @for (line of node.displayLines; track $index) {
              <tspan
                [attr.x]="node.x + node.width / 2"
                [attr.dy]="$index === 0 ? '0' : '12'"
              >{{ line }}</tspan>
            }
          </text>
        </g>
      }
    </g>
  </svg>

  <!-- Node tooltip -->
  @if (tooltip(); as tip) {
    <div
      class="node-tooltip"
      role="tooltip"
      [style.left.px]="tip.x"
      [style.top.px]="tip.y"
    >{{ tip.text }}</div>
  }

  <!-- Hint overlay -->
  <div id="hint" [class.gone]="!hintVisible()" aria-live="polite">
    <div class="hint-box">
      <div class="hint-ico">
        <lucide-icon name="mouse-pointer-click" [size]="20" color="#4a7cf7" [strokeWidth]="1.8" aria-hidden="true"></lucide-icon>
      </div>
      <div class="hint-t">Selecciona una opcion del arbol</div>
      <div class="hint-s">Haz click en las opciones para continuar</div>
    </div>
  </div>
</div>
