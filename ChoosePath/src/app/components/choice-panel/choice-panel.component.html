<div class="choices-wrap">
  <div class="choices-hd">Decisiones — <span class="a">arrastra al árbol</span></div>
  <div class="choices-stack">
    @if (choices().length === 0) {
      <p style="font-family: var(--f-mono); font-size: 0.6rem; color: var(--ink4); padding: 4px 0">
        Fin de esta rama.
      </p>
    } @else {
      @for (choice of choices(); track choice.text; let i = $index) {
        <div
          class="cc"
          tabindex="0"
          [attr.data-choice]="choice.text"
          [attr.aria-label]="'Opcion ' + choice.key + ': ' + choice.text"
          [class.cc-disabled]="!choice.nextNodeId"
          (mousedown)="onChoiceMouseDown($event, choice)"
        >
          <span class="cck">{{ choice.key }}</span>
          <span class="cctxt">{{ choice.text }}</span>
          @if (hasMemory()(choice.text)) {
            <span class="cc-mem">memoria</span>
          }
          <lucide-icon name="grip-vertical" class="ccgrip" [size]="10" color="var(--ink3)" [strokeWidth]="1.5" aria-hidden="true"></lucide-icon>
        </div>
      }
    }
  </div>
</div>
